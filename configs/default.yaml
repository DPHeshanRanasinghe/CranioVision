project:
  name: CranioVision
  output_dir: outputs

data:
  # Set this before running notebooks or training.
  root_dir: ""
  expected_modalities:
    - t1
    - t1ce
    - t2
    - flair
  # Only `t1c` and `seg` are explicitly visible in the existing notebook.
  # The other aliases are exposed here so dataset variants can be adjusted in config,
  # not hidden inside code.
  modality_aliases:
    t1:
      - t1
      - t1n
    t1ce:
      - t1ce
      - t1c
    t2:
      - t2
    flair:
      - flair
      - t2f
  label_aliases:
    - seg
  file_extensions:
    - .nii.gz
    - .nii
  validation_ratio: 0.2
  seed: 42
  validate_shapes: true
  batch_size: 1
  val_batch_size: 1
  num_workers: 2
  cache_rate: 0.0

labels:
  # The current notebook shows BraTS labels {0, 2, 3, 4}.
  # We remap them to contiguous class IDs {0, 1, 2, 3} for stable training.
  original_values:
    - 0
    - 2
    - 3
    - 4
  mapped_values:
    - 0
    - 1
    - 2
    - 3
  class_names:
    - background
    - edema
    - enhancing_tumor
    - necrotic_core

preprocessing:
  orientation: RAS
  resample: true
  target_spacing:
    - 1.0
    - 1.0
    - 1.0
  roi_size:
    - 128
    - 128
    - 128
  train_samples_per_volume: 2
  crop_pos: 1
  crop_neg: 1
  normalize_nonzero: true

model:
  name: unet
  in_channels: 4
  out_channels: 4
  channels:
    - 16
    - 32
    - 64
    - 128
    - 256
  strides:
    - 2
    - 2
    - 2
    - 2
  num_res_units: 2
  feature_size: 48
  use_checkpoint: false

training:
  device: cuda
  seed: 42
  epochs: 50
  learning_rate: 0.0002
  weight_decay: 0.00001
  amp: true
  val_interval: 1
  loss: dice_ce

inference:
  sw_batch_size: 1
  overlap: 0.5

visualization:
  prediction_sample_count: 3
  slice_axis: 2
  modality_for_panels: t1ce
