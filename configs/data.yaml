data:
  # Relative paths are resolved from this config file's directory.
  # Local default for the BraTS small dataset under the repo's data/ folder.
  root_dir: ../data/raw/BraTS2024_small_dataset
  expected_modalities:
    - t1
    - t1ce
    - t2
    - flair
  modality_aliases:
    t1:
      - t1
      - t1n
    t1ce:
      - t1ce
      - t1c
    t2:
      - t2
      - t2w
    flair:
      - flair
      - t2f
  label_aliases:
    - seg
  file_extensions:
    - .nii.gz
    - .nii
  validation_ratio: 0.2
  seed: 42
  validate_shapes: true
  split_manifest_path: null
  batch_size: 1
  val_batch_size: 1
  num_workers: 2
  cache_rate: 0.0

labels:
  # BraTS masks are often encoded as {0, 2, 3, 4}. The training pipeline
  # remaps them to contiguous indices for stable multi-class segmentation.
  original_values:
    - 0
    - 2
    - 3
    - 4
  mapped_values:
    - 0
    - 1
    - 2
    - 3
  class_names:
    - background
    - edema
    - enhancing_tumor
    - necrotic_core

preprocessing:
  orientation: RAS
  resample: true
  target_spacing:
    - 1.0
    - 1.0
    - 1.0
  roi_size:
    - 128
    - 128
    - 128
  train_samples_per_volume: 2
  crop_pos: 1
  crop_neg: 1
  normalize_nonzero: true
